name: Azure Event Grid
description: >-
  Azure Event Grid provides APIs for publishing events to custom topics, managing
  event subscriptions with filtering, and configuring event delivery to endpoints
  including webhooks, Azure Functions, Event Hubs, and Storage Queues. It supports
  dead-lettering, retry policies, and custom event schemas.
